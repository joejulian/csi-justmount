name: Renovate Automerge

on:
  push:
    branches:
      - main
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - labeled
      - ready_for_review
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  enable:
    runs-on: ubuntu-latest
    steps:
      - name: Enable automerge for current PR
        if: ${{ github.event_name == 'pull_request_target' && startsWith(github.event.pull_request.head.ref, 'renovate/') && contains(join(github.event.pull_request.labels.*.name, ','), 'automerge') && !github.event.pull_request.draft }}
        env:
          GH_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          state="$(gh pr view --repo "${{ github.repository }}" "${PR_NUMBER}" --json mergeStateStatus --jq '.mergeStateStatus')"
          if [[ "${state}" == "BEHIND" ]]; then
            gh pr update-branch --repo "${{ github.repository }}" "${PR_NUMBER}" --rebase
          fi

          if gh pr merge --repo "${{ github.repository }}" --auto --rebase "${PR_NUMBER}"; then
            exit 0
          fi

          gh pr update-branch --repo "${{ github.repository }}" "${PR_NUMBER}" --rebase
          gh pr merge --repo "${{ github.repository }}" --auto --rebase "${PR_NUMBER}"
      - name: Enable automerge for open Renovate PRs
        if: ${{ github.event_name != 'pull_request_target' }}
        env:
          GH_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set +e
          failed=0
          gh pr list --repo "${REPO}" --state open --json number,headRefName,isDraft,labels,mergeStateStatus \
            --jq '.[] | select((.headRefName | startswith("renovate/")) and (.isDraft | not) and ((.labels | map(.name) | index("automerge")) != null)) | @base64' \
            | while read -r pr_json; do
                [[ -n "${pr_json}" ]] || continue
                pr="$(printf '%s' "${pr_json}" | base64 -d | jq -r '.number')"
                state="$(printf '%s' "${pr_json}" | base64 -d | jq -r '.mergeStateStatus')"

                if [[ "${state}" == "BEHIND" ]]; then
                  gh pr update-branch --repo "${REPO}" "${pr}" --rebase || failed=1
                fi

                if gh pr merge --repo "${REPO}" --auto --rebase "${pr}"; then
                  continue
                fi

                if gh pr update-branch --repo "${REPO}" "${pr}" --rebase; then
                  gh pr merge --repo "${REPO}" --auto --rebase "${pr}" || failed=1
                else
                  failed=1
                fi
              done
          exit "${failed}"
